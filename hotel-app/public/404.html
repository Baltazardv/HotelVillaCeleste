<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Hotel Villa Celeste</title>
    <!--
      Single Page App fallback for GitHub Pages.
      Redirects deep links (e.g. /HotelVillaCeleste/galeria) back to index.html
      while preserving the requested path, so React Router can render the route.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1; // keep "/HotelVillaCeleste" in the path
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
