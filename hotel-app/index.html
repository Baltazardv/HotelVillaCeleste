<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Restores the original URL after the 404.html SPA redirect (GitHub Pages). -->
    <script type="text/javascript">
      (function () {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>
    <title>Hotel Villa Celeste — Tlapa de Comonfort, Guerrero</title>
    <meta name="description" content="Hotel Villa Celeste en Tlapa de Comonfort, Guerrero. Hospedaje colonial de encanto con jardines, alberca, habitaciones confortables y atención personalizada, en la región de La Montaña. Reserva ahora." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
